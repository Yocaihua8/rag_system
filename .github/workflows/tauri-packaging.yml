name: Tauri Packaging

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  native-packaging:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS dmg
            os: macos-latest
            command: npm run tauri:build:macos
            artifact_name: knowledge-island-macos-dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux AppImage
            os: ubuntu-latest
            command: npm run tauri:build:linux
            artifact_name: knowledge-island-linux-appimage
            artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install Rust stable
        shell: bash
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
            export PATH="$HOME/.cargo/bin:$PATH"
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Node dependencies
        run: npm ci --include=optional

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt -r requirements-dev.txt

      - name: Build native Tauri bundle
        shell: bash
        env:
          PYTHON: .venv/bin/python
        run: ${{ matrix.command }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
